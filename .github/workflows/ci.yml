name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Compile
        run: python -m py_compile a_share_mcp/*.py scripts/*.py
      - name: Deterministic MCP protocol smoke test
        run: python scripts/protocol_smoke.py
      - name: Secret pattern scan
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          pat = re.compile(r"(api[_-]?key|secret|password|token|authorization)\s*[:=]\s*['\"][^'\"]{6,}", re.I)
          hits = []
          for path in Path('.').rglob('*'):
              if path.is_file() and '.git' not in path.parts and '__pycache__' not in path.parts:
                  text = path.read_text(errors='ignore')
                  for i, line in enumerate(text.splitlines(), 1):
                      if pat.search(line):
                          hits.append(f"{path}:{i}:{line[:120]}")
          if hits:
              print('\n'.join(hits))
              sys.exit(1)
          print('secret scan ok')
          PY
